name: Update Realtime Test

on:
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyhydat
            dplyr
            lubridate
            tibble

      - name: Run update script
        timeout-minutes: 60
        env:
          TZ: UTC
        run: |
          Rscript scripts/update_realtime_test.R

      - name: Commit and push if changed
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/realtime_WL_data.rds data/realtime_flow_data.rds
          git diff --staged --quiet || (git commit -m "Auto-update: realtime data $(date +'%Y-%m-%d %H:%M:%S UTC')" && git push)