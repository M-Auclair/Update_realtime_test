name: Update Realtime Test

on:
  schedule:
    # LEVEL: every 3 hours during day window 
    - cron: "0 12,15,18,21,0,3 * * *"
    # FLOW: twice daily 
    - cron: "0 14,2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "level | flow | both"
        required: false
        default: "level"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"

      - name: Install deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyhydat
            dplyr
            lubridate

      - name: Choose mode from trigger
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            HOUR_UTC=$(date -u +%H)
            # Flow twice daily at 02:00 and 14:00 UTC
            if [ "$HOUR_UTC" = "02" ] || [ "$HOUR_UTC" = "14" ]; then
              MODE="flow"
            else
              MODE="level"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"

      - name: Run update script
        timeout-minutes: 60
        env:
          TZ: UTC
        run: |
          Rscript scripts/update_realtime_data.R --mode=${{ steps.mode.outputs.mode }}

      - name: Commit and push if changed
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/realtime_WL_data.rds data/realtime_flow_data.rds
          git diff --staged --quiet || (git commit -m "Auto-update: realtime data $(date +'%Y-%m-%d %H:%M:%S UTC')" && git push)